<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentations — jwoo9928</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --canvas: #f7f7f4;
            --card: #ffffff;
            --ink: #26251e;
            --body: #5a5852;
            --muted: #807d72;
            --primary: #f54e00;
            --secondary: #0f766e;
            --accent: #b45309;
            --hairline: #e6e5e0;
            --badge: #e6e5e0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --canvas: #0b0c10;
                --card: #14161e;
                --ink: #e2e8f0;
                --body: #94a3b8;
                --muted: #6b7280;
                --primary: #f54e00;
                --secondary: #10b981;
                --accent: #f59e0b;
                --hairline: #222530;
                --badge: #222530;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--canvas);
            color: var(--ink);
            font-family: 'Noto Sans KR', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding: 64px 24px;
            display: flex;
            justify-content: center;
        }
        .wrap { width: 100%; max-width: 880px; }
        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 14px;
        }
        h1 {
            font-size: 40px;
            font-weight: 400;
            letter-spacing: -1.2px;
            line-height: 1.15;
            margin-bottom: 14px;
        }
        .lead {
            font-size: 16px;
            color: var(--body);
            line-height: 1.6;
            margin-bottom: 44px;
            max-width: 640px;
        }
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }
        .list { display: flex; flex-direction: column; gap: 16px; }
        .ppt-card {
            display: block;
            background: var(--card);
            border: 1px solid var(--hairline);
            border-radius: 14px;
            padding: 24px 26px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.18s ease, transform 0.18s ease;
        }
        .ppt-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .ppt-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .ppt-title {
            font-size: 21px;
            font-weight: 700;
            color: var(--ink);
        }
        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 9999px;
        }
        .tag-rec { background: rgba(245,78,0,0.12); color: var(--primary); border: 1px solid rgba(245,78,0,0.3); }
        .tag-alt { background: var(--badge); color: var(--muted); }
        .ppt-desc { font-size: 14.5px; color: var(--body); line-height: 1.55; margin-bottom: 14px; }
        .ppt-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }
        .open {
            margin-left: auto;
            color: var(--primary);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        footer {
            margin-top: 56px;
            padding-top: 24px;
            border-top: 1px solid var(--hairline);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        footer a { color: var(--secondary); text-decoration: none; }
        @media (max-width: 600px) {
            body { padding: 40px 16px; }
            h1 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="eyebrow">Presentation Deck</div>
        <h1>발표 자료 목록</h1>
        <p class="lead">
            인터랙티브 슬라이드 모음입니다. 카드를 클릭하면 발표가 열립니다.
            키보드 → / ← 또는 클릭으로 슬라이드를 넘기고, 우하단 버튼으로 다크/라이트 테마와 레이저 포인터를 전환할 수 있습니다.
        </p>

        <div class="list">
            <!-- 새 발표를 추가하려면 아래 블록을 복사해 href와 제목만 바꾸세요 -->
            <a class="ppt-card" href="mamba_presentation_visual.html">
                <div class="ppt-head">
                    <span class="ppt-title">Transformer에서 Mamba까지</span>
                </div>
                <div class="ppt-meta">
                    <span>15 slides + 보너스</span>
                    <span>한국어</span>
                    <span class="open">열기 →</span>
                </div>
            </a>
        </div>

        <footer>
            <span>© 2026 jwoo9928</span>
            <span>Source: <a href="https://github.com/jwoo9928/presentaion">github.com/jwoo9928/presentaion</a></span>
        </footer>
    </div>
</body>
</html>
